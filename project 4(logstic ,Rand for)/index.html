<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection App</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding: 40px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 350px;
            margin: auto;
            box-shadow: 0px 0px 10px gray;
        }
        input, select, button {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }
        button {
            background: #28a745;
            color: white;
            border: none;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>💳 Fraud Detection</h2>

    <input type="number" id="distance" placeholder="Distance from Home">

    <input type="number" id="ratio" placeholder="Ratio to Median Price">

    <select id="pin">
        <option value="0">PIN Not Used (0)</option>
        <option value="1">PIN Used (1)</option>
    </select>

    <select id="online">
        <option value="0">Offline (0)</option>
        <option value="1">Online (1)</option>
    </select>

    <button onclick="predict()">Predict</button>

    <div id="result"></div>
</div>

<script>
async function predict() {
    const data = {
        distance_from_home: parseFloat(document.getElementById("distance").value),
        ratio_to_median_purchase_price: parseFloat(document.getElementById("ratio").value),
        used_pin_number: parseInt(document.getElementById("pin").value),
        online_order: parseInt(document.getElementById("online").value)
    };

    const response = await fetch("/predict/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("result").innerHTML =
        `Result: ${result.prediction} <br> Probability: ${result.probability}`;
}
</script>

</body>
</html>
