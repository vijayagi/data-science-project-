<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 6px 0 12px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        .fraud {
            color: red;
        }

        .safe {
            color: green;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Fraud Detection</h2>

    <form id="fraudForm">

        <label>Transaction Amount</label>
        <input type="number" id="amount" required>

        <label>Transaction Hour</label>
        <input type="number" id="transaction_hour" min="0" max="23" required>

        <label>Device Trust Score</label>
        <input type="number" id="device_trust_score" required>

        <label>frequency of transactions per day</label>
        <input type="number" id="velocity_last_24h" required>

        <label>Cardholder Age</label>
        <input type="number" id="cardholder_age" required>

        <label>Foreign Transaction</label>
        <select id="foreign_transaction">
            <option value="0">No </option>
            <option value="1">Yes </option>
        </select>

        <label>Location Mismatch</label>
        <select id="location_mismatch">
            <option value="0">No </option>
            <option value="1">Yes </option>
        </select>

        <label>Merchant Category</label>
        <select id="merchant_category_encoded">
            <option value="1">Electronics</option>
            <option value="2">Food</option>
            <option value="3">Grocery</option>
            <option value="4">Travel</option>
        </select>

        <button type="submit">Predict</button>
    </form>

    <div id="result"></div>
</div>

<script>
document.getElementById("fraudForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        amount: parseFloat(document.getElementById("amount").value),
        transaction_hour: parseFloat(document.getElementById("transaction_hour").value),
        device_trust_score: parseInt(document.getElementById("device_trust_score").value),
        velocity_last_24h: parseInt(document.getElementById("velocity_last_24h").value),
        cardholder_age: parseInt(document.getElementById("cardholder_age").value),
        foreign_transaction: parseInt(document.getElementById("foreign_transaction").value),
        location_mismatch: parseInt(document.getElementById("location_mismatch").value),
        merchant_category_encoded: parseInt(document.getElementById("merchant_category_encoded").value)
    };

    const response = await fetch("/predict/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    const resultDiv = document.getElementById("result");

    if(result.prediction === "Fraud"){
        resultDiv.className = "fraud";
    } else {
        resultDiv.className = "safe";
    }

    resultDiv.innerText =
        `Prediction: ${result.prediction} \nProbability: ${result.probability}`;
});
</script>

</body>
</html>
